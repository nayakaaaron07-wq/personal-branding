<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Skills | Neon Dark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: '#39FF14',
                        dark: '#050505',
                        'dark-gray': '#121212',
                    },
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #e5e7eb; }
        .neon-text { color: #39FF14; text-shadow: 0 0 5px rgba(57, 255, 20, 0.5); }
        .neon-bg { background-color: #39FF14; box-shadow: 0 0 15px rgba(57, 255, 20, 0.6); }
        .neon-shadow { filter: drop-shadow(0 0 8px rgba(57, 255, 20, 0.4)); }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body class="antialiased font-sans">
    <header class="bg-black/80 backdrop-blur-md sticky top-0 z-50 border-b border-white/10">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold neon-text tracking-tighter italic">NAYAKA.</a>
            <div class="hidden md:flex space-x-10 uppercase text-xs font-bold tracking-widest">
                <a href="index.html" class="hover:text-neon transition-colors">Home</a>
                <a href="about.html" class="hover:text-neon transition-colors">About</a>
                <a href="projects.html" class="hover:text-neon transition-colors">Projects</a>
                <a href="skills.html" class="text-neon transition-colors border-b-2 border-neon pb-1">Skills</a>
            </div>
        </nav>
    </header>

    <main class="py-32">
        <div class="container mx-auto px-6 text-center mb-24">
            <div class="flex items-center justify-center gap-4 mb-6 uppercase tracking-[0.4em] text-xs font-bold">
                <div class="w-12 h-[1px] bg-neon"></div>
                <span>Capabilities</span>
                <div class="w-12 h-[1px] bg-neon"></div>
            </div>
            <h1 class="text-6xl md:text-9xl font-black mb-8 tracking-tighter italic uppercase neon-text">TECH STACK.</h1>
        </div>

        <div class="container mx-auto px-6 max-w-4xl">
            <div class="space-y-16">
                <!-- JavaScript -->
                <div class="group">
                    <div class="flex justify-between items-end mb-4">
                        <div class="flex items-center gap-4">
                            <span class="text-2xl font-black italic group-hover:neon-text transition duration-300">JAVASCRIPT</span>
                        </div>
                        <span class="text-neon font-bold font-mono tracking-widest">49%</span>
                    </div>
                    <div class="h-4 bg-white/5 border border-white/10 relative overflow-hidden">
                        <div class="absolute inset-y-0 left-0 bg-neon neon-shadow transition-all duration-1000 ease-out" style="width: 49%">
                            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/30 to-transparent animate-[shimmer_2s_infinite]" style="animation: shimmer 2s infinite;"></div>
                        </div>
                    </div>
                </div>

                <!-- C++ -->
                <div class="group">
                    <div class="flex justify-between items-end mb-4">
                        <div class="flex items-center gap-4">
                            <span class="text-2xl font-black italic group-hover:neon-text transition duration-300">C++</span>
                        </div>
                        <span class="text-neon font-bold font-mono tracking-widest">21%</span>
                    </div>
                    <div class="h-4 bg-white/5 border border-white/10 relative overflow-hidden">
                        <div class="absolute inset-y-0 left-0 bg-neon neon-shadow transition-all duration-1000 ease-out" style="width: 21%">
                            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/30 to-transparent animate-[shimmer_2s_infinite]" style="animation: shimmer 2s infinite;"></div>
                        </div>
                    </div>
                </div>

                <!-- HTML & CSS -->
                <div class="group">
                    <div class="flex justify-between items-end mb-4">
                        <div class="flex items-center gap-4">
                            <span class="text-2xl font-black italic group-hover:neon-text transition duration-300">HTML & CSS</span>
                        </div>
                        <span class="text-neon font-bold font-mono tracking-widest">58%</span>
                    </div>
                    <div class="h-4 bg-white/5 border border-white/10 relative overflow-hidden">
                        <div class="absolute inset-y-0 left-0 bg-neon neon-shadow transition-all duration-1000 ease-out" style="width: 58%">
                            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/30 to-transparent animate-[shimmer_2s_infinite]" style="animation: shimmer 2s infinite;"></div>
                        </div>
                    </div>
                </div>

                <!-- SQL -->
                <div class="group">
                    <div class="flex justify-between items-end mb-4">
                        <div class="flex items-center gap-4">
                            <span class="text-2xl font-black italic group-hover:neon-text transition duration-300">SQL</span>
                        </div>
                        <span class="text-neon font-bold font-mono tracking-widest">10%</span>
                    </div>
                    <div class="h-4 bg-white/5 border border-white/10 relative overflow-hidden">
                        <div class="absolute inset-y-0 left-0 bg-neon neon-shadow transition-all duration-1000 ease-out" style="width: 10%">
                            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/30 to-transparent animate-[shimmer_2s_infinite]" style="animation: shimmer 2s infinite;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark-gray border-t border-white/5 py-12 mt-20">
        <div class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-8 text-center md:text-left">
            <div>
                <h3 class="text-2xl font-bold neon-text italic mb-2">NAYAKA.</h3>
                <p class="text-gray-500 text-sm">Building digital experiences in the shadows.</p>
            </div>
            <div class="flex space-x-6 text-sm font-medium">
                <a href="#" class="hover:text-neon transition">LinkedIn</a>
                <a href="#" class="hover:text-neon transition">GitHub</a>
                <a href="#" class="hover:text-neon transition">Instagram</a>
            </div>
        </div>
    </footer>
</body>
</html>
